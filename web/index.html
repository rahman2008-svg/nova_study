<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOVA AI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f19;
  color: white;
}

/* HEADER */
header {
  background: #111827;
  padding: 15px;
  text-align: center;
  font-size: 18px;
}

/* CHAT BOX */
#chat {
  height: 80vh;
  overflow-y: auto;
  padding: 10px;
}

/* MESSAGE */
.msg {
  padding: 12px;
  margin: 8px;
  border-radius: 10px;
  max-width: 80%;
  white-space: pre-wrap;
}

.user {
  background: #2563eb;
  margin-left: auto;
}

.ai {
  background: #1f2937;
}

/* INPUT AREA */
.input-box {
  display: flex;
  padding: 10px;
  background: #111827;
  position: fixed;
  bottom: 0;
  width: 100%;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
}

button {
  margin-left: 5px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
}
</style>
</head>

<body>

<header>📚 NOVA Study Assistant</header>

<div id="chat"></div>

<div class="input-box">
  <input id="input" placeholder="Type or speak..." />
  <button onclick="send()">Send</button>
  <button onclick="startVoice()">🎤</button>
</div>

<script>

function add(text, type){
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
  div.scrollIntoView();
}

async function send(){
  let q = document.getElementById("input").value;
  if(!q) return;

  add(q, "user");

  let res = await fetch("/ask", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({question:q})
  });

  let data = await res.json();

  add(data.answer, "ai");

  speak(data.answer);

  document.getElementById("input").value = "";
}

/* 🎤 VOICE INPUT (FIXED) */
function startVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Voice not supported");
    return;
  }

  const recognition = new SpeechRecognition();

  recognition.lang = "bn-BD";
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    console.log("🎤 Listening...");
  };

  recognition.onresult = (event) => {
    let text = event.results[0][0].transcript;
    document.getElementById("input").value = text;
    send();
  };

  recognition.onerror = (e) => {
    alert("Voice error: " + e.error);
  };

  recognition.start();
}

/* 🔊 VOICE OUTPUT */
function speak(text){
  let msg = new SpeechSynthesisUtterance(text);
  msg.lang = "bn-BD";
  speechSynthesis.speak(msg);
}

</script>

</body>
</html>
